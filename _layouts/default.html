<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; color: #24292e; }
    a { color: #0366d6; }
    a:hover { text-decoration: underline; }
    h1 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }

    tr:nth-child(even) { background: #f6f8fa; }
